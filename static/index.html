<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeVision — Premium Edge Detection</title>
  <meta name="description" content="A premium web application for real-time image edge detection using Canny and Sobel algorithms with a stunning glassmorphism interface." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Background blobs ── -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ── Header ── -->
  <header class="app-header glass-card">
    <div class="header-left">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none"><rect x="2" y="2" width="28" height="28" rx="8" stroke="currentColor" stroke-width="2.5"/><path d="M8 24L14 14L18 19L22 12L26 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h1 id="app-title">EdgeVision</h1>
    </div>
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark/light mode" title="Toggle theme">
      <svg class="icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Upload Card -->
    <section id="upload-section" class="upload-section">
      <div id="drop-zone" class="drop-zone glass-card">
        <div class="drop-zone-content">
          <svg class="upload-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M24 32V12M16 20l8-8 8 8"/><path d="M40 32v6a4 4 0 01-4 4H12a4 4 0 01-4-4v-6"/></svg>
          <p class="drop-text">Drop your image here</p>
          <span class="drop-subtext">or click to browse</span>
          <span class="drop-formats">PNG, JPG, WEBP — up to 10 MB</span>
        </div>
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" hidden />
      </div>
    </section>

    <!-- Results -->
    <section id="results-section" class="results-section hidden">

      <!-- Image Comparison -->
      <div class="comparison-grid">
        <div class="image-card glass-card">
          <span class="image-label">Original</span>
          <div class="image-wrapper">
            <img id="original-img" alt="Original uploaded image" />
          </div>
        </div>
        <div class="image-card glass-card">
          <span class="image-label">Edge Detected</span>
          <div class="image-wrapper">
            <img id="processed-img" alt="Edge-detected result" />
          </div>
        </div>
      </div>

      <!-- Controls Panel -->
      <div class="controls-panel glass-card">
        <h2 class="controls-title">Controls</h2>

        <div class="control-group">
          <label>Algorithm</label>
          <div class="custom-select" id="algorithm-select" data-value="canny">
            <div class="custom-select-trigger">
              <span class="custom-select-label">Canny</span>
              <svg class="custom-select-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
            </div>
            <ul class="custom-select-options">
              <li class="custom-select-option selected" data-value="canny">Canny</li>
              <li class="custom-select-option" data-value="sobel">Sobel</li>
            </ul>
          </div>
        </div>


        <div class="control-group">
          <label for="intensity-slider">Edge Intensity <span id="intensity-value" class="slider-val">50</span></label>
          <input type="range" id="intensity-slider" min="1" max="100" value="50" />
          <div class="intensity-hint">
            <span>Fewer edges</span>
            <span>More detail</span>
          </div>
        </div>


        <div class="controls-actions">
          <button id="download-btn" class="btn btn-primary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
            Download
          </button>
          <button id="new-image-btn" class="btn btn-secondary">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            New Image
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p class="loading-text">Processing…</p>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
